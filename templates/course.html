<!DOCTYPE html>
<html>
<head>
    <title>{{ subject }} Course</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>{{ subject }} Course</h1>

    <a href="/subjects" class="back-btn">← Back to Subjects</a>

    <div class="lesson-grid">

        {% for lesson in lessons %}

        <div class="lesson-card">
            <h2>{{ lesson }}</h2>

            <p>
                Learn important concepts and improve your skills.
            </p>

            <a href="/learn/{{ subject }}">
                Start Learning
            </a>
        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
