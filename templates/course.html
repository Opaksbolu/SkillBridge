<!DOCTYPE html>
<html>
<head>
    <title>{{ subject }}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav>
    <a href="/dashboard">{{ text.dashboard }}</a>
    <a href="/subjects">{{ text.subjects }}</a>
    <a href="/logout">{{ text.logout }}</a>

    <div class="language-switch">
        <a href="/set_language/English">EN</a>
        <a href="/set_language/Spanish">ES</a>
        <a href="/set_language/French">FR</a>
    </div>
</nav>

<div class="container">

    <h1>{{ subject }}</h1>

    {% for lesson in lessons %}

    <div class="card">
        <h2>{{ lesson.title }}</h2>
        <p>{{ lesson.content }}</p>

        <a href="/learn/{{ subject }}">
            <button>{{ text.ai_tutor }}</button>
        </a>
    </div>

    {% endfor %}

</div>

</body>
</html>
