<!DOCTYPE html>
<html>
<head>
    <title>{{ subject }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <div class="topbar">
        <a href="/subjects">← Back</a>

        <div>
            <a href="/change_language/English">EN</a>
            <a href="/change_language/Spanish">ES</a>
            <a href="/change_language/French">FR</a>
        </div>
    </div>

    <h1>{{ subject }}</h1>

    <div class="lesson-grid">

        {% for lesson in lessons %}

        <div class="lesson-card">
            <h2>{{ lesson }}</h2>

            <p>
                Learn important concepts in {{ subject }}
                with SkillBridge AI tutoring.
            </p>

            <button>Start Lesson</button>
        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
