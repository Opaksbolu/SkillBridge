<!DOCTYPE html>
<html>

<head>
    <title>{{ subject }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <a href="/subjects" class="back-btn">← Back</a>

    <h1>{{ subject }}</h1>

    <div class="lesson-grid">

        {% for lesson in lessons %}

        <div class="lesson-card">

            <h2>{{ lesson }}</h2>

            <p>
                Improve your understanding and build real skills.
            </p>

            <a href="/learn/{{ subject }}">
                Start Learning
            </a>

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
