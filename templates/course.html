{% extends "base.html" %}

{% block content %}

<h1>{{ subject }}</h1>

{% for module, lesson_list in lessons.items() %}

<div class="card">

    <h2>{{ module }}</h2>

    <ul>

        {% for lesson in lesson_list %}
            <li>{{ lesson }}</li>
        {% endfor %}

    </ul>

</div>

{% endfor %}

<a href="/learn/{{ subject }}">
    <button>Open AI Tutor</button>
</a>

{% endblock %}
