<!DOCTYPE html>
<html>
<head>
    <title>{{ subject }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>{{ subject }} Course</h1>

<div class="subjects-grid">

{% for lesson in lessons %}

<div class="card">

<h2>{{ lesson }}</h2>

<a href="/learn/{{ subject }}">
    <button>Start Lesson</button>
</a>

</div>

{% endfor %}

</div>

</body>
</html>
