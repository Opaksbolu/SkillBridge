<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav>

<h1>SkillBridge</h1>

<div>
    <a href="/">Home</a>
    <a href="/dashboard">{{ t.dashboard }}</a>
    <a href="/subjects">{{ t.subjects }}</a>
    <a href="/logout">{{ t.logout }}</a>

    <a href="/set_language/en">EN</a>
    <a href="/set_language/es">ES</a>
    <a href="/set_language/fr">FR</a>
</div>

</nav>

<div class="hero">

<h2>{{ t.welcome }}, {{ username }}</h2>

<div class="card">

<h3>{{ t.subjects }}</h3>

<p>Explore learning paths.</p>

<a href="/subjects">
    <button>Open</button>
</a>

</div>

<div class="card">

<h3>{{ t.ai }}</h3>

<input
type="text"
id="aiInput"
placeholder="Ask AI anything..."
>

<button onclick="askAI()">Ask AI</button>

<p id="response"></p>

</div>

</div>

<script>

async function askAI() {

    const message =
        document.getElementById("aiInput").value;

    const response = await fetch("/ai", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            message: message
        })
    });

    const data = await response.json();

    document.getElementById("response").innerText =
        data.response;
}

</script>

</body>
</html>
