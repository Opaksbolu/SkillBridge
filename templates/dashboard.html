<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>{{ text.welcome }}, {{ user[1] }} 👋</h1>

<!-- SUBJECTS -->
<div class="card">
<h3>{{ text.subjects }}</h3>

<div class="subject-grid">
{% for subject in subjects %}
<a href="/learn/{{ subject.original }}">
    <div class="subject-card">
        {{ subject.translated }}
    </div>
</a>
{% endfor %}
</div>

</div>

<!-- RECOMMENDATIONS -->
<div class="card">
<h3>{{ text.recommended }} 🤖</h3>

{% for rec in recommendations %}
<div class="recommendation">{{ rec }}</div>
{% endfor %}

</div>

<a href="/logout" class="logout">{{ text.logout }}</a>

</div>

</body>
</html>
