<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>Welcome, {{ session['user'] }} 👋</h1>

    <h2>Your Subjects</h2>

    <div class="subjects">
        {% for subject in subjects %}
            <a class="card" href="/learn/{{subject}}">{{subject}}</a>
        {% endfor %}
    </div>

    <br>
    <a class="btn" href="/subjects">⬅ Change Subjects</a>
    <a class="btn" href="/logout">Logout</a>
</div>

</body>
</html>
