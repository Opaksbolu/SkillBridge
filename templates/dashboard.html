<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>{{ text.welcome }}, {{ user[1] }} 👋</h1>

<div class="card">
<h3>{{ text.subjects }}</h3>
<ul>
{% for subject in user[7].split(', ') %}
<li><a href="/learn/{{ subject }}">{{ subject }}</a></li>
{% endfor %}
</ul>
</div>

<div class="card highlight">
<h3>{{ text.recommended }} 🤖</h3>
<ul>
{% for rec in recommendations %}
<li>{{ rec }}</li>
{% endfor %}
</ul>
</div>

<a href="/logout" class="logout">{{ text.logout }}</a>

</div>

</body>
</html>
