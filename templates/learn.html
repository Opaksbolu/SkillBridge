{% extends "base.html" %}

{% block content %}

<h1>{{ subject }} AI Tutor</h1>

<div class="card">

    <form method="POST">

        <textarea
            name="question"
            placeholder="Ask anything..."
            required
        ></textarea>

        <button type="submit">
            Ask AI
        </button>

    </form>

</div>

{% if response %}

<div class="card">

    <h2>Response</h2>

    <p>{{ response }}</p>

</div>

{% endif %}

{% endblock %}
