<!DOCTYPE html>
<html>
<head>
    <title>Learn</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Learn {{ subject }}</h1>

        <form method="POST">
            <input type="text" name="question" placeholder="Ask anything..." required style="width:100%; padding:10px;">
            <button type="submit">Ask AI</button>
        </form>

        {% if response %}
            <div class="card">
                <h3>AI Tutor Response:</h3>
                <p>{{ response }}</p>
            </div>
        {% endif %}

        <br>
        <a href="/dashboard">⬅ Back to Dashboard</a>
    </div>
</body>
</html>
