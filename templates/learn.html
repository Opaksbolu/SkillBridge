<!DOCTYPE html>
<html>
<head>
    <title>{{subject}}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <a class="btn" href="/dashboard">⬅ Back</a>

    <h1>Learning {{subject}}</h1>

    <form method="POST">
        <input type="text" name="question" placeholder="Ask something..." required>
        <button type="submit">Ask AI</button>
    </form>

    {% if ai_response %}
        <div class="response">
            {{ai_response}}
        </div>
    {% endif %}
</div>

</body>
</html>
