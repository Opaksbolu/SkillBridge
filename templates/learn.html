<!DOCTYPE html>
<html>
<head>
<title>{{ subject }}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>{{ subject }} 📘</h1>

<div class="card">
<h3>Lessons</h3>

{% for lesson in lessons %}
<div class="lesson">
    <h4>{{ lesson.title }}</h4>
    <p>{{ lesson.content }}</p>
</div>
{% endfor %}

</div>

<a href="/dashboard" class="logout">⬅ Back to Dashboard</a>

</div>

</body>
</html>
