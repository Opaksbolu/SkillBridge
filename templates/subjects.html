{% extends "base.html" %}

{% block content %}

<h1>{{ text.subjects }}</h1>

<div class="dashboard-grid">

    {% for subject in ["Math", "Science", "Programming"] %}

    <div class="card">

        <h2>{{ subject }}</h2>

        <form method="POST">

            <input
                type="hidden"
                name="subject"
                value="{{ subject }}"
            >

            <button type="submit">
                {{ text.start }}
            </button>

        </form>

    </div>

    {% endfor %}

</div>

{% endblock %}
