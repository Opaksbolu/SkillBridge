<!DOCTYPE html>
<html>
<head>
    <title>Choose Subjects</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h2>Select Your Subjects</h2>

        <form method="POST">
            <div class="subject-grid">
                {% for subject in subjects %}
                    <label class="subject">
                        <input type="checkbox" name="subjects" value="{{ subject }}">
                        {{ subject }}
                    </label>
                {% endfor %}
            </div>

            <button type="submit">Continue</button>
        </form>

        <br>
        <a href="/register">⬅ Back</a>
    </div>
</body>
</html>
