{% extends "base.html" %}

{% block content %}

<div class="auth-container">

    <h1>Welcome Back</h1>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">

        <input
            type="text"
            name="login"
            placeholder="Username or Email"
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
        >

        <button type="submit">Login</button>

    </form>

    <p>No account? <a href="/register">Register</a></p>

</div>

{% endblock %}
