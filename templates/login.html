{% extends "base.html" %}

{% block content %}

<div class="auth-card">

    <h1>Welcome Back</h1>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">

        <input
            type="text"
            name="identifier"
            placeholder="Username or Email"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <p>
        No account?
        <a href="/register">Register</a>
    </p>

</div>

{% endblock %}
