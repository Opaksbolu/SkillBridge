{% extends "base.html" %}

{% block content %}

<div class="card">

    <h1>Login</h1>

    {% if error %}
        <p>{{ error }}</p>
    {% endif %}

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

</div>

{% endblock %}
